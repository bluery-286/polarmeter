name: PolarMeter Cache Pages

on:
  workflow_dispatch:
  schedule:
    # Weekdays: every 30 minutes as the baseline. UTC schedule; app displays provider dataAsOf.
    - cron: '*/30 * * * 1-5'
    # Korea market confirmation points:
    # 09:30/10:00 KST after open, 15:45/16:30 KST after close/final delayed data.
    - cron: '30 0 * * 1-5'
    - cron: '0 1 * * 1-5'
    - cron: '45 6 * * 1-5'
    - cron: '30 7 * * 1-5'
    # US market confirmation points. Includes both US daylight and standard time.
    # 09:30 ET +30/+60m, 16:00 ET +15/+60m.
    - cron: '0 14,15 * * 1-5'
    - cron: '30 14,15 * * 1-5'
    - cron: '15 20,21 * * 1-5'
    - cron: '0 21,22 * * 1-5'
    # Weekends: hourly so overseas/geopolitics headlines do not sit stale.
    - cron: '0 * * * 0,6'

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: polarmeter-cache-pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Build Pages payload
        env:
          TWELVE_DATA_API_KEY: ${{ secrets.TWELVE_DATA_API_KEY }}
          FMP_API_KEY: ${{ secrets.FMP_API_KEY }}
          DATA_GO_KR_SERVICE_KEY: ${{ secrets.DATA_GO_KR_SERVICE_KEY }}
        run: |
          python3 tools/polarmeter_github_pages_prepare.py --output ./_site
          python3 tools/polarmeter_github_pages_smoke.py
      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./_site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
